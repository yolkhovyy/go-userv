---
name: Run Tests and Build

on:
  push:
    branches:
      - master

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install
        run: make install

      - name: Run tests
        run: make test

      - name: Generate coverage report
        run: make coverage

      - name: Build project
        run: make build
